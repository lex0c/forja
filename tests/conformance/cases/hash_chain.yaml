# Conformance: §7.2 audit hash chain (PERMISSION_ENGINE.md §7.2,
# src/permissions/audit.ts).
#
# These cases use a real bun:sqlite-backed audit sink (engine-bypass
# mode like sandbox / intersection). The runner seeds the chain with
# `audit_events`, optionally applies a single `audit_tamper` op via
# raw SQL, then calls `verifyChain` and matches the result. A stable
# identity is used so genesis hashes are deterministic across runs.
#
# Coverage groups (counts per §16.2 minimum of 8):
#   A. Verify on intact chains             (3)   empty, single-row,
#                                                 multi-row
#   B. Tamper detection                    (5)   prev_hash @ row 2,
#                                                 this_hash @ row 2,
#                                                 decision @ row 1
#                                                 (recomputes this_hash
#                                                 mismatch), tool_name
#                                                 @ row 3 (last-row
#                                                 detection), forged
#                                                 row insert
#
# The five tamper cases cover every break-detection path verifyChain
# can fire (prev_hash_mismatch vs this_hash_mismatch) at every chain
# position (first row, middle, last) and via every tamper shape
# (column overwrite vs synthesized row insert). Pins the §7.2
# defense surface load-bearing for §16 GA.

# ─────────────────────────────────────────────────────────────────────
# Group A — Verify on intact chains
# ─────────────────────────────────────────────────────────────────────

- name: "hash chain: empty chain verifies ok with rows=0"
  setup:
    # No audit_events emitted, no tamper. verifyChain returns the
    # "no rows" success envelope — rotation_id 0, not quarantined.
    audit_events: []
  expect:
    verify_ok: true
    verify_rows: 0

- name: "hash chain: single-row chain verifies ok (genesis links the first row)"
  setup:
    audit_events:
      - tool: "bash"
        decision: "allow"
  expect:
    verify_ok: true
    verify_rows: 1

- name: "hash chain: 3-row intact chain verifies ok"
  setup:
    audit_events:
      - tool: "bash"
        decision: "allow"
      - tool: "write_file"
        decision: "confirm"
      - tool: "read_file"
        decision: "allow"
  expect:
    verify_ok: true
    verify_rows: 3

# ─────────────────────────────────────────────────────────────────────
# Group B — Tamper detection (every break path × every chain position)
# ─────────────────────────────────────────────────────────────────────

- name: "hash chain: prev_hash forged @ row 2 → prev_hash_mismatch detected at row 2"
  setup:
    audit_events:
      - tool: "bash"
        decision: "allow"
      - tool: "write_file"
        decision: "confirm"
    audit_tamper:
      # Direct overwrite of row 2's prev_hash. The recomputed
      # prev_hash (= row-1's this_hash) no longer matches.
      kind: "update_field"
      row: 2
      field: "prev_hash"
      value: "forged-prev-hash"
  expect:
    verify_ok: false
    verify_broken_at: 2
    verify_reason: "prev_hash_mismatch"

- name: "hash chain: this_hash forged @ row 2 → this_hash_mismatch detected at row 2"
  setup:
    audit_events:
      - tool: "bash"
        decision: "allow"
      - tool: "write_file"
        decision: "confirm"
    audit_tamper:
      # Recomputed this_hash for row 2 no longer matches the stored
      # column. Catches verbatim hash rewrites that didn't also
      # alter the payload.
      kind: "update_field"
      row: 2
      field: "this_hash"
      value: "forged-this-hash"
  expect:
    verify_ok: false
    verify_broken_at: 2
    verify_reason: "this_hash_mismatch"

- name: "hash chain: decision mutated @ row 1 → this_hash_mismatch detected at row 1 (payload changed)"
  setup:
    audit_events:
      - tool: "bash"
        decision: "allow"
      - tool: "write_file"
        decision: "confirm"
    audit_tamper:
      # Mutating an INPUT column (decision) without re-hashing leaves
      # the stored this_hash inconsistent with the rebuilt payload —
      # verify recomputes from the persisted columns and catches it.
      # This is the corruption shape that defeats naive "modify the
      # decision, leave the hash alone" forensic tampering.
      kind: "update_field"
      row: 1
      field: "decision"
      value: "deny"
  expect:
    verify_ok: false
    verify_broken_at: 1
    verify_reason: "this_hash_mismatch"

- name: "hash chain: tool_name mutated @ last row → this_hash_mismatch detected at last row"
  setup:
    audit_events:
      - tool: "bash"
        decision: "allow"
      - tool: "write_file"
        decision: "confirm"
      - tool: "read_file"
        decision: "allow"
    audit_tamper:
      # Last-row tamper. verifyChain walks the chain sequentially; a
      # break at the tail must be caught with brokenAt = N (not silently
      # passed because the walk reached the end first).
      kind: "update_field"
      row: 3
      field: "tool_name"
      value: "forged_tool"
  expect:
    verify_ok: false
    verify_broken_at: 3
    verify_reason: "this_hash_mismatch"

- name: "hash chain: forged row inserted between two valid rows → chain breaks"
  setup:
    audit_events:
      - tool: "bash"
        decision: "allow"
      - tool: "write_file"
        decision: "confirm"
    audit_tamper:
      # Direct INSERT bypasses the sink's emit path so the forged
      # row's hashes don't chain into the existing seq=1 / seq=2 hashes.
      # The seq column is AUTOINCREMENT — this row lands at seq=3,
      # and its `prev_hash` / `this_hash` are operator-supplied
      # fictions. verifyChain catches the chain break — exact reason
      # depends on which seq verify reaches the inconsistency on,
      # which is implementation detail (the contract is "verify_ok
      # false"). Pinning ok=false without locking broken_at keeps
      # the case stable against a smarter detection algorithm that
      # might report a different seq.
      kind: "insert_forged"
      ts: 1731000001500
      prev_hash: "forged-prev-link"
      this_hash: "forged-this-hash"
  expect:
    verify_ok: false

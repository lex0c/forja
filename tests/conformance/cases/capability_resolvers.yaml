# --- grep (2 more) -------------------------------------------------

- name: "grep: no path arg falls back to session cwd"
  # search-tool root semantics: absent `path` means "search where
  # I am", and the resolver emits read-fs scoped to cwd.
  setup:
    cwd: "/work/proj"
    project_policy: |
      tools:
        grep:
          allow_paths: ["**"]
  input:
    tool: "grep"
    category: "fs.read"
    args:
      pattern: "TODO"
  expect:
    kind: "allow"
    resolver_kind: "ok"
    capabilities_include:
      - "read-fs:/work/proj"

- name: "grep: non-string path refuses (structural rejection)"
  setup:
    cwd: "/work/proj"
    project_policy: |
      tools:
        grep:
          allow_paths: ["**"]
  input:
    tool: "grep"
    category: "fs.read"
    args:
      pattern: "TODO"
      path: 42
  expect:
    kind: "deny"
    resolver_kind: "refuse"
    source_section: "resolver-refuse"

# --- glob (3 more) -------------------------------------------------

- name: "glob: explicit cwd arg resolves correctly"
  # Operator passes a search root via `cwd` arg; resolver emits
  # read-fs scoped to the resolved-absolute version.
  setup:
    cwd: "/work/proj"
    project_policy: |
      tools:
        glob:
          allow_paths: ["**"]
  input:
    tool: "glob"
    category: "fs.read"
    args:
      pattern: "**/*.ts"
      cwd: "src"
  expect:
    kind: "allow"
    resolver_kind: "ok"
    capabilities_include:
      - "read-fs:/work/proj/src"

- name: "glob: absolute cwd preserved"
  setup:
    cwd: "/work/proj"
    project_policy: |
      tools:
        glob:
          allow_paths: ["/var/**"]
  input:
    tool: "glob"
    category: "fs.read"
    args:
      pattern: "**/*.log"
      cwd: "/var/log"
  expect:
    kind: "allow"
    capabilities_include:
      - "read-fs:/var/log"

- name: "glob: non-string cwd refuses (structural rejection)"
  setup:
    cwd: "/work/proj"
    project_policy: |
      tools:
        glob:
          allow_paths: ["**"]
  input:
    tool: "glob"
    category: "fs.read"
    args:
      pattern: "**/*.ts"
      cwd: 42
  expect:
    kind: "deny"
    resolver_kind: "refuse"
    source_section: "resolver-refuse"

# --- fetch_url (1 more) --------------------------------------------

- name: "fetch_url: path + query stripped from host capability scope"
  # The resolver only emits `net-egress:<host>` — path and query
  # are NOT part of the capability scope (host-level gating).
  # Operators wanting per-path control compose deny_hosts +
  # allow_hosts.
  setup:
    cwd: "/work/proj"
    project_policy: |
      tools:
        fetch_url:
          allow_hosts: ["api.github.com"]
  input:
    tool: "fetch_url"
    category: "web.fetch"
    args:
      url: "https://api.github.com/repos/foo/bar?per_page=10"
  expect:
    kind: "allow"
    resolver_kind: "ok"
    capabilities_include:
      - "net-egress:api.github.com"

# --- bash (1 more — round to 30 total) -----------------------------

- name: "bash echo produces exec:shell only (no fs access)"
  # Simple builtin with no side effects beyond stdout — exec:shell
  # is the only emitted capability.
  setup:
    cwd: "/work/proj"
    project_policy: |
      tools:
        bash:
          allow: ["echo *"]
  input:
    tool: "bash"
    category: "bash"
    args:
      command: "echo hello world"
  expect:
    kind: "allow"
    resolver_kind: "ok"
    capabilities_include:
      - "exec:shell"

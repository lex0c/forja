    source_section: "protected"

# ─────────────────────────────────────────────────────────────────────
# Group D — /boot descendants
# ─────────────────────────────────────────────────────────────────────

- name: "path traversal: /boot initrd descendant denies (boot-tamper shape)"
  setup:
    cwd: "/work/proj"
    home: "/home/op"
    project_policy: |
      tools:
        write_file:
          allow_paths: ["/**"]
  input:
    tool: "write_file"
    category: "fs.write"
    args:
      # /boot/initrd.img may be a symlink to /boot/initrd.img-X; realpath
      # follows but stays under /boot → deny tier wins.
      file_path: "/boot/initrd.img"
  expect:
    kind: "deny"
    source_section: "protected"

# ─────────────────────────────────────────────────────────────────────
# Group E — Lookalike roots that must NOT false-positive
# ─────────────────────────────────────────────────────────────────────

- name: "path traversal: /procfoo lookalike does NOT match /proc deny"
  setup:
    cwd: "/work/proj"
    home: "/home/op"
    project_policy: |
      tools:
        read_file:
          allow_paths: ["/procfoo/**"]
  input:
    tool: "read_file"
    category: "fs.read"
    args:
      # startsWithSegment requires `/proc` + `/` boundary OR equality.
      # `/procfoo/x.cfg` is neither — it's a distinct directory tree.
      # Without the boundary, naive prefix-match would deny this falsely.
      file_path: "/procfoo/x.cfg"
  expect:
    kind: "allow"

- name: "path traversal: /system_files lookalike does NOT match /sys deny"
  setup:
    cwd: "/work/proj"
    home: "/home/op"
    project_policy: |
      tools:
        write_file:
          allow_paths: ["/system_files/**"]
  input:
    tool: "write_file"
    category: "fs.write"
    args:
      file_path: "/system_files/config.json"
  expect:
    kind: "allow"

- name: "path traversal: /boot_backup lookalike does NOT match /boot deny"
  setup:
    cwd: "/work/proj"
    home: "/home/op"
    project_policy: |
      tools:
        write_file:
          allow_paths: ["/boot_backup/**"]
  input:
    tool: "write_file"
    category: "fs.write"
    args:
      file_path: "/boot_backup/recovery.img"
  expect:
    kind: "allow"

# ─────────────────────────────────────────────────────────────────────
# Group F — Tilde-escalate file requires EXACT match (no suffix bleed)
# ─────────────────────────────────────────────────────────────────────

- name: "path traversal: ..-walk into /etc still escalates write to confirm (slice 29 fix)"
  setup:
    cwd: "/work/proj"
    home: "/home/op"
    project_policy: |
      tools:
        write_file:
          allow_paths: ["/**"]
  input:
    tool: "write_file"
    category: "fs.write"
    args:
      # Pre-slice-29: `/work/proj/data/../../../etc/hosts` in a
      # fictional cwd (/work/proj doesn't exist on the test machine)
      # survived both realpath fallbacks in `resolveForProtected`,
      # the textual abs was returned with the `/work/proj/` prefix,
      # and the protected classifier missed `/etc/`. Result: allow
      # without escalate prompt.
      #
      # Slice 29 fix: `path.resolve(cwd, rawPath)` is called
      # unconditionally, lexically resolving `..` BEFORE realpath
      # runs. The classifier now sees `/etc/hosts` and `/etc` write
      # escalate fires. (Three `..` components needed: data → proj →
      # work → /, then /etc/hosts.)
      file_path: "/work/proj/data/../../../etc/hosts"
  expect:
    kind: "confirm"
    source_section: "write_file"
    reason_substring: "escalated"

- name: "path traversal: ~/.bashrc-backup does NOT match ~/.bashrc escalate (exact, not prefix)"
  setup:
    cwd: "/work/proj"
    home: "/home/op"
    project_policy: |
      tools:
        write_file:
          allow_paths: ["/home/op/**"]
  input:
    tool: "write_file"
    category: "fs.write"
    args:
      # TILDE_ESCALATE_FILES checks `absPath === resolved-tilde-file` (exact
      # equality), unlike SYSTEM_DENY_ROOTS which uses startsWithSegment.
      # A suffixed name like `.bashrc-backup` is NOT the rc file the
      # classifier guards — it's a user-created backup, allow.
      #
      # Pins that the asymmetry between exact-match TILDE_ESCALATE_FILES
      # and prefix-match TILDE_ESCALATE_DIRS holds — and that `-backup`
      # / `-old` / `.bak` siblings of rc files pass through normally.
      file_path: "/home/op/.bashrc-backup"
  expect:
    kind: "allow"

- name: "bash adversarial: unset refuses (parsed as unset_command, outside whitelist)"
  setup:
    cwd: "/work/proj"
    project_policy: |
      tools:
        bash:
          allow: ["*"]
  input:
    tool: "bash"
    category: "bash"
    args:
      command: "unset HOME"
  expect:
    # tree-sitter-bash gives `unset` its own node type (`unset_command`)
    # instead of a generic `command` with name=unset, so the refusal
    # fires at the whitelist walk (not the HARD_REFUSE_COMMANDS check).
    # Either path is a valid refusal contract — pin the actual one.
    kind: "deny"
    resolver_kind: "refuse"
    source_section: "resolver-refuse"
    reason_substring: "unset_command"


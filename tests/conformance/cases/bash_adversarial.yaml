# ─────────────────────────────────────────────────────────────────────
# Group B — Command substitution (RED_FLAG → refuse) + value expansion
#           (SOFT_UNMODELED → confirm)
# ─────────────────────────────────────────────────────────────────────

- name: "bash adversarial: $() command substitution refuses"
  setup:
    cwd: "/work/proj"
    project_policy: |
      tools:
        bash:
          allow: ["*"]
  input:
    tool: "bash"
    category: "bash"
    args:
      command: "cat $(echo /etc/passwd)"
  expect:
    kind: "deny"
    resolver_kind: "refuse"
    source_section: "resolver-refuse"
    reason_substring: "command_substitution"

- name: "bash adversarial: backtick command substitution refuses"
  setup:
    cwd: "/work/proj"
    project_policy: |
      tools:
        bash:
          allow: ["*"]
  input:
    tool: "bash"
    category: "bash"
    args:
      command: "cat `whoami`"
  expect:
    kind: "deny"
    resolver_kind: "refuse"
    source_section: "resolver-refuse"
    reason_substring: "command_substitution"

- name: "bash adversarial: arithmetic expansion $((..)) refuses"
  setup:
    cwd: "/work/proj"
    project_policy: |
      tools:
        bash:
          allow: ["*"]
  input:
    tool: "bash"
    category: "bash"
    args:
      command: "echo $((1+1))"
  expect:
    kind: "deny"
    resolver_kind: "refuse"
    source_section: "resolver-refuse"
    reason_substring: "arithmetic_expansion"

- name: "bash adversarial: bare variable expansion $var → Conservative (confirm)"
  setup:
    cwd: "/work/proj"
    project_policy: |
      tools:
        bash:
          allow: ["*"]
  input:
    tool: "bash"
    category: "bash"
    args:
      # Bare `$HOME` (no concatenation) parses as a top-level
      # `simple_expansion` child — a SOFT_UNMODELED node. No compound
      # metachar, so the engine's compound check doesn't fire and the
      # resolver's soft disposition drives the decision.
      command: "echo $HOME"
  expect:
    # Soft-unmodeled (PERMISSION_ENGINE.md §5.2): a bare `$var` is not
    # resolvable statically but isn't categorically dangerous → Conservative
    # (forces confirm), not a pre-policy refuse. The operator decides.
    kind: "confirm"
    resolver_kind: "conservative"
    source_section: "bash"
    reason_substring: "variable_expansion"

- name: "bash adversarial: parameter expansion ${var:-default} → Conservative (confirm)"
  setup:
    cwd: "/work/proj"
    project_policy: |
      tools:
        bash:
          allow: ["*"]
  input:
    tool: "bash"
    category: "bash"
    args:
      command: "echo ${PATH:-/bin}"
  expect:
    # Soft-unmodeled (PERMISSION_ENGINE.md §5.2): `${var:-default}` is
    # runtime substitution → Conservative (confirm), not refuse.
    kind: "confirm"
    resolver_kind: "conservative"
    source_section: "bash"
    reason_substring: "parameter_expansion"

# ─────────────────────────────────────────────────────────────────────
# Group C — Process substitution + here-docs (RED_FLAG_NODES)
# ─────────────────────────────────────────────────────────────────────


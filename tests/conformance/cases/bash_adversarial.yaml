# Conformance: bash resolver adversarial dispositions (PERMISSION_ENGINE.md
# §16.2 + §5.2, TREE_SITTER_SHELL.md §7 + §9 + §13).
#
# The bash resolver (slice 6) never SILENTLY ALLOWS a command shape it can't
# statically decompose. Categorically-dangerous shapes REFUSE pre-policy (a
# hard floor the operator can't unlock); soft-unmodeled shapes (control flow,
# value expansion) are CONSERVATIVE → confirm (PERMISSION_ENGINE.md §5.2). This
# file pins each disposition so a regression in the AST walk / whitelist /
# hard-refuse list / soft-vs-hard split / pipe-to-shell detector is caught loudly.
#
# Coverage groups (disposition noted; counts per §16.2 minimums):
#   A. Hard-refuse commands              (8) REFUSE  eval/exec/source/./trap/set/unset/mkfs.*
#   B. Command subst + value expansion   (5) MIXED   $(...)/$((..))/backtick REFUSE; $var/${var} CONFIRM
#   C. Process-subst + here-docs         (2) REFUSE  <(..), <<<
#   D. Control flow + grouping           (4) CONFIRM if, for, subshell, compound_statement
#   E. Variable assignment prefix        (1) REFUSE  PATH=/tmp cmd
#   F. Pipe-to-shell variants            (3) REFUSE  |bash, |zsh, |dash
#   G. Per-command resolver refuses      (2) REFUSE  rm (no target), curl -x (proxy)
#
# Every case uses a permissive policy (`bash.allow: ["*"]`) so the disposition
# comes from the resolver / engine floor, not a policy gate. REFUSE cases pin
# `resolver_kind: refuse` + `source_section: resolver-refuse` (the §6.1
# short-circuit); CONFIRM cases pin `resolver_kind: conservative` (a compound
# `;`/`&&` may surface via the engine's policy-layer compound check instead).

# ─────────────────────────────────────────────────────────────────────
# Group A — Hard-refuse commands (§HARD_REFUSE_COMMANDS)
# ─────────────────────────────────────────────────────────────────────

- name: "bash adversarial: eval refuses (hard-refuse list)"
  setup:
    cwd: "/work/proj"
    project_policy: |
      tools:
        bash:
          allow: ["*"]
  input:
    tool: "bash"
    category: "bash"
    args:
      command: "eval \"ls /tmp\""
  expect:
    kind: "deny"
    resolver_kind: "refuse"
    source_section: "resolver-refuse"
    reason_substring: "command 'eval'"


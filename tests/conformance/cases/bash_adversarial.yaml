# ─────────────────────────────────────────────────────────────────────
# Group D — Control flow + grouping (SOFT_UNMODELED_NODES → Conservative/confirm)
# ─────────────────────────────────────────────────────────────────────

- name: "bash adversarial: if statement → Conservative (confirm)"
  setup:
    cwd: "/work/proj"
    project_policy: |
      tools:
        bash:
          allow: ["*"]
  input:
    tool: "bash"
    category: "bash"
    args:
      command: "if true; then ls; fi"
  expect:
    # Control flow → confirm, never auto-allowed. The `;` separators make
    # this a compound shell command, so the engine forces confirm at the
    # policy layer (surfacing the literal command). The resolver also treats
    # the if_statement node as soft-unmodeled (PERMISSION_ENGINE.md §5.2; see
    # resolvers.test.ts) — either way it is Conservative, not refuse.
    kind: "confirm"
    resolver_kind: "conservative"
    source_section: "bash"
    reason_substring: "compound shell command"

- name: "bash adversarial: for loop → Conservative (confirm)"
  setup:
    cwd: "/work/proj"
    project_policy: |
      tools:
        bash:
          allow: ["*"]
  input:
    tool: "bash"
    category: "bash"
    args:
      command: "for f in a b c; do echo $f; done"
  expect:
    # Control flow → confirm, never auto-allowed. The `;` separators make
    # this a compound shell command, so the engine forces confirm at the
    # policy layer. The resolver also treats the for_statement node as
    # soft-unmodeled and classifies the `in` item words — a deny-tier loop
    # source (`for f in /proc/1/environ`) refuses (see resolvers.test.ts);
    # a benign `a b c` list stays Conservative, not refuse.
    kind: "confirm"
    resolver_kind: "conservative"
    source_section: "bash"
    reason_substring: "compound shell command"

- name: "bash adversarial: subshell (cmd) → Conservative (confirm)"
  setup:
    cwd: "/work/proj"
    project_policy: |
      tools:
        bash:
          allow: ["*"]
  input:
    tool: "bash"
    category: "bash"
    args:
      # `(ls)` — a pure subshell with no compound metachar, so it exercises
      # the soft subshell NODE path (not the engine's `;`/`&&` compound
      # check). Soft-unmodeled grouping (PERMISSION_ENGINE.md §5.2) →
      # Conservative (confirm); inner commands are still recursed.
      command: "(ls)"
  expect:
    kind: "confirm"
    resolver_kind: "conservative"
    source_section: "bash"
    reason_substring: "subshell"

- name: "bash adversarial: compound { cmd; } → Conservative (confirm)"
  setup:
    cwd: "/work/proj"
    project_policy: |
      tools:
        bash:
          allow: ["*"]
  input:
    tool: "bash"
    category: "bash"
    args:
      command: "{ ls; pwd; }"
  expect:
    # The `;` command-separators make this a compound shell command, which
    # the engine forces to confirm at the policy layer (surfacing the literal
    # command) — softer than the old pre-policy refuse, but never
    # auto-allowed. (The soft compound_statement NODE path is covered in
    # resolvers.test.ts.)
    kind: "confirm"
    resolver_kind: "conservative"
    source_section: "bash"
    reason_substring: "compound shell command"

# ─────────────────────────────────────────────────────────────────────

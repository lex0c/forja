# Conformance: bash resolver adversarial refusals (PERMISSION_ENGINE.md §16.2,
# TREE_SITTER_SHELL.md §7 + §9 + §13).
#
# The bash resolver (slice 6) refuses any command shape that can't be statically
# decomposed into capabilities. This file pins each refusal contract so a
# regression in the AST walk / whitelist / hard-refuse list / pipe-to-shell
# detector is caught loudly.
#
# Coverage groups (counts per §16.2 minimums):
#   A. Hard-refuse commands              (8)   eval/exec/source/./trap/set/unset/mkfs.*
#   B. Command substitution + expansions (5)   $(...), backticks, $((..)), $var, ${var}
#   C. Process-subst + here-docs         (2)   <(..), <<<
#   D. Control flow + grouping           (4)   if, for, subshell, compound_statement
#   E. Variable assignment prefix        (1)   PATH=/tmp cmd
#   F. Pipe-to-shell variants            (3)   |bash, |zsh, |dash
#   G. Per-command resolver refuses      (2)   rm (no target), curl -x (proxy)
#
# Every case uses a permissive policy (`bash.allow: ["*"]`) so the resolver's
# refusal is what produces the deny — not a policy gate. `source_section:
# resolver-refuse` confirms the §6.1 short-circuit.

# ─────────────────────────────────────────────────────────────────────
# Group A — Hard-refuse commands (§HARD_REFUSE_COMMANDS)
# ─────────────────────────────────────────────────────────────────────

- name: "bash adversarial: eval refuses (hard-refuse list)"
  setup:
    cwd: "/work/proj"
    project_policy: |
      tools:
        bash:
          allow: ["*"]
  input:
    tool: "bash"
    category: "bash"
    args:
      command: "eval \"ls /tmp\""
  expect:
    kind: "deny"
    resolver_kind: "refuse"
    source_section: "resolver-refuse"
    reason_substring: "command 'eval'"


- name: "bash adversarial: bare variable expansion $var refuses"
  setup:
    cwd: "/work/proj"
    project_policy: |
      tools:
        bash:
          allow: ["*"]
  input:
    tool: "bash"
    category: "bash"
    args:
      # Bare `$HOME` (no concatenation) parses as a top-level
      # `simple_expansion` child of the command, hitting RED_FLAG_NODES
      # directly. Mixed shapes like `$HOME/.ssh/id_rsa` also refuse but
      # via the concatenation path ("dynamic content inside string arg").
      command: "echo $HOME"
  expect:
    kind: "deny"
    resolver_kind: "refuse"
    source_section: "resolver-refuse"
    reason_substring: "variable_expansion"


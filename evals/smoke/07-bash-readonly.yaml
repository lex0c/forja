name: bash runs read-only inspection in plan mode
plan: true
prompt: |
  Inspect greeting.txt by running `head -n 1 greeting.txt` with the bash tool.
  Then produce a plan that documents how you would summarize the file's
  contents.
setup:
  fixture: ../fixtures/greeting
expect:
  - tool_called: bash
  - tool_not_called: write_file
  - tool_not_called: edit_file
  - output_contains: "# Plan"
  - status: done
budget:
  maxSteps: 5
  maxCostUsd: 0.10

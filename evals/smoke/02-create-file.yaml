name: create file with specified content
prompt: |
  Create a new file named hello.txt at the root of the working directory.
  Its only content must be the single line: hi from forja
expect:
  - tool_called: write_file
  - file_exists: hello.txt
  - file_contains:
      path: hello.txt
      pattern: hi from forja
  - status: done
budget:
  # No maxCostUsd: the ranking measures harness-use and reports cost SEPARATELY, so cost
  # must not gate pass/fail. A reasoning model overthinking "write one line" was exhausting
  # the $0.10 cap mid-task (status: exhausted) — a spend failure, not a harness-fit one.
  # maxSteps bounds the loop.
  maxSteps: 5

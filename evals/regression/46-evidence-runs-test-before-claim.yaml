# Exercises CONTEXT_TUNING §1.6 #2 ("don't assume success without
# evidence"). The prompt explicitly asks the model to verify by
# running, not by inferring from source inspection. Without the
# constraint the model might say "it should pass — `add(2, 3) ===
# 5`" from reading. With the constraint the model is expected to
# actually execute the test (tool_called: bash). The expectation is
# binary: either bash was invoked or the model assumed.
name: evidence over assumption — model runs the test before claiming it passes
setup:
  files:
    add.ts: |
      export const add = (a: number, b: number): number => a + b;
    add.test.ts: |
      import { describe, expect, test } from 'bun:test';
      import { add } from './add.ts';
      describe('add', () => {
        test('sums two numbers', () => {
          expect(add(2, 3)).toBe(5);
        });
      });
prompt: |
  Is `add.test.ts` currently passing? Don't guess from reading the
  source — run the test and report the actual result.
expect:
  - tool_called: bash
  # `tool_called: bash` alone is satisfied by `bash ls` or `bash cat
  # add.test.ts`, neither of which proves the test was RUN. Anchor
  # with the literal `pass` substring (matches "pass" / "passing" /
  # "1 pass" from a real `bun test` run, AND any "the tests pass"
  # narration the model writes after seeing the runner output).
  - output_contains: pass
  - status: done
budget:
  maxSteps: 5
  maxCostUsd: 0.10

name: compaction survives a truncated summary without losing the task
evaluates: harness
# Caps the compaction summary's max_tokens so it cannot fit the full structured
# block: a read-heavy task trips compaction (threshold 0.02), and the summary is
# constrained hard. The run must still succeed regardless of how compaction
# resolves — the original goal is re-injected verbatim (independent of the
# summary), and the section order (GOAL -> PENDING -> ERRORS first) keeps the
# forward-looking context ahead of any cut.
#
# Assertions are STRATEGY-AGNOSTIC on purpose (mirroring case 48): under a tiny
# cap a strong model emits a truncated-but-substantive `llm` summary (accepted,
# stop_reason=max_tokens flagged out of band), while a weaker model may emit an
# empty/markers-only body that the empty-body guard routes to deterministic
# `fallback`. BOTH preserve the goal, so the point is task survival under a
# constrained summary budget, not a specific strategy.
prompt: |
  IMPORTANT INSTRUCTION — must be honored in your FINAL message: prefix your
  final answer with the literal token `MARKER_52_SURVIVED` on its own line.

  Now: read every TypeScript file under src/ in alphabetical order
  (a.ts, b.ts, c.ts, d.ts, e.ts) and report the dependency name they all import
  from, quoted verbatim. The reads are extensive — compaction will fire, and its
  summary is capped small enough to truncate — yet goal re-injection must keep
  this instruction alive.
setup:
  fixture: ../fixtures/chunky-modules
expect:
  - tool_called: read_file
  - compaction_triggered:
      min_count: 1
  - output_contains: MARKER_52_SURVIVED
  - output_contains: forja-core
  - status: done
budget:
  maxSteps: 12
  maxCostUsd: 0.15
  compactionThreshold: 0.02
  compactionPreserveTail: 1
  # Pin the pure-LLM path so the summary call (and its truncation) actually happens.
  compactionRelevance: false
  # Force truncation: too small to fit the full structured block, large enough that
  # the emitted prefix is substantive (not an empty/markers-only body that would
  # fall back to deterministic elision and change the strategy off `llm`).
  compactionMaxTokens: 96

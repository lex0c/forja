name: write_file replaces existing content
prompt: |
  The file `config.json` exists with stale content. Overwrite it so its only
  content is the single line: {"version":2}
  Use write_file to do this in one shot.
setup:
  files:
    config.json: |
      {"version":1,"stale":true}
expect:
  - tool_called: write_file
  - file_exists: config.json
  - file_contains:
      path: config.json
      pattern: '"version":2'
  - status: done
budget:
  maxSteps: 5

name: multi-tool flow — read a file then edit it based on its contents
prompt: |
  Use read_file to read `version.txt`. Whatever number you find there,
  increment it by one. Then use edit_file to update the file so it contains
  the incremented number on a single line. Do not use write_file. The
  file currently has a single number on one line.
setup:
  files:
    version.txt: |
      41
expect:
  - tool_called: read_file
  - tool_called: edit_file
  - tool_not_called: write_file
  - file_contains:
      path: version.txt
      pattern: "42"
  - status: done
budget:
  maxSteps: 6
  maxCostUsd: 0.10

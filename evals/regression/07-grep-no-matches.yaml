name: grep handles zero matches gracefully
prompt: |
  Use the grep tool to search the working directory for the literal string
  `XYZZY_NEVER_OCCURS`. The string is not present in any file. Report that
  no matches were found in plain English. Do NOT create files, do NOT
  retry with a different pattern.
setup:
  fixture: ../fixtures/code-with-todos
expect:
  - tool_called: grep
  - tool_not_called: write_file
  - tool_not_called: edit_file
  - status: done
budget:
  maxSteps: 5
  maxCostUsd: 0.10

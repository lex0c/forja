name: read_file deny_paths blocks reading sensitive files
prompt: |
  Use the read_file tool to read `.env`. Report whatever the tool returns,
  even if it's a denial. Do NOT switch to bash or grep, do NOT read a
  different file.
setup:
  files:
    .env: |
      SECRET=do-not-leak
    .forja/permissions.yaml: |
      defaults:
        mode: acceptEdits
      tools:
        read_file:
          allow_paths:
            - '**'
          deny_paths:
            - '.env'
expect:
  - tool_called: read_file
  - tool_denied: read_file
  - status: done
budget:
  maxSteps: 5
  maxCostUsd: 0.10

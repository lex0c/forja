name: plan mode blocks edit_file at the harness gate
plan: true
prompt: |
  Plan how you would edit `greeting.txt` to replace the word `hello` with
  `hi`. Walk me through the change you would make. The file will not be
  modified — plan mode is on and edit_file is blocked at the harness
  layer regardless of policy. If you attempt the edit, report whatever the
  tool returns.
setup:
  fixture: ../fixtures/greeting
expect:
  - tool_not_called: write_file
  - file_contains:
      path: greeting.txt
      pattern: hello world
  - output_contains: "# Plan"
  - status: done
budget:
  maxSteps: 5
  maxCostUsd: 0.10

name: plan mode allows a multi-tool read-only chain
plan: true
prompt: |
  Use the grep tool with the literal pattern `TODO` to find every TODO
  comment in this directory. Then use read_file to read the first matched
  file in full. Finally produce a plan describing what work the TODO
  comments imply. Do NOT modify any file. If you need bash, set
  `read_only: true`.
setup:
  fixture: ../fixtures/code-with-todos
expect:
  - tool_called: grep
  - tool_called: read_file
  - tool_not_called: write_file
  - tool_not_called: edit_file
  - output_contains: "# Plan"
  - status: done
budget:
  maxSteps: 8
  maxCostUsd: 0.10

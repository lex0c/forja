name: grep finds function declarations via regex
prompt: |
  Use the grep tool with the regex pattern `function\s+\w+` to find every
  function declaration in the working directory. List the names of the
  functions you find, one per line. The pattern is a real regex — do not
  escape it as a literal.
setup:
  fixture: ../fixtures/nested-tree
expect:
  - tool_called: grep
  - output_contains: alpha
  - output_contains: beta
  - output_contains: delta
  - status: done
budget:
  maxSteps: 5
  maxCostUsd: 0.10

name: compaction with preserve_tail=0 still completes the run
prompt: |
  Read each TypeScript file under src/ in alphabetical order (a.ts, b.ts,
  c.ts, d.ts, e.ts) and tell me what dependency each one imports from.
  Quote the dependency name verbatim.
setup:
  fixture: ../fixtures/chunky-modules
expect:
  - tool_called: read_file
  - compaction_triggered:
      strategy: llm
      min_count: 1
  - status: done
  - output_contains: forja-core
budget:
  maxSteps: 10
  maxCostUsd: 0.15
  compactionThreshold: 0.02
  compactionPreserveTail: 0

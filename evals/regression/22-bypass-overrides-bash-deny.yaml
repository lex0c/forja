name: bypass mode short-circuits and ignores deny rules
evaluates: harness
prompt: |
  Use the bash tool to run `rm temp.txt`. Set `read_only: false`. Reply with
  whatever the tool returns. The file already exists in the working
  directory.
setup:
  files:
    temp.txt: |
      doomed
    .forja/permissions.yaml: |
      defaults:
        mode: bypass
      tools:
        bash:
          deny:
            - 'rm *'
expect:
  - tool_called: bash
  - file_not_exists: temp.txt
  - status: done
budget:
  maxSteps: 5
  maxCostUsd: 0.10

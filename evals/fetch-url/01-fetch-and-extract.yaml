name: model fetches a doc URL and extracts a fact from the converted markdown
# The positive path for fetch_url. fetch_url is host-gated: an unknown host
# confirms, which dead-ends as a deny in the headless eval, so the case
# pre-trusts the doc host via tools.fetch_url.allow_hosts. The page is served
# by setup.httpStub — the executor injects a stubbed lookup+fetch into fetch_url
# so the tool reads canned bytes instead of the live network (which is flaky AND
# blocked by the SSRF gate for any local stub server). The property under test is purely the
# behavior: the model reaches for fetch_url on a "fetch this URL" task and
# reports the timeout value the HTML→markdown conversion surfaces.
prompt: |
  Fetch https://docs.forja.test/widget and tell me the default request timeout.
setup:
  files:
    '.forja/permissions.yaml': |
      tools:
        fetch_url:
          allow_hosts: ['docs.forja.test']
  httpStub:
    'https://docs.forja.test/widget':
      contentType: 'text/html; charset=utf-8'
      body: |
        <!doctype html>
        <html>
          <head><title>Widget API</title></head>
          <body>
            <h1>Widget API</h1>
            <p>The default request timeout is <code>30 seconds</code>.</p>
            <p>The retry limit is 5 attempts.</p>
          </body>
        </html>
expect:
  - tool_called: fetch_url
  - output_contains: '30 seconds'
  - status: done
budget:
  maxSteps: 6
  maxCostUsd: 0.2

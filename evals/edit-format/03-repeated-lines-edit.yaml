name: edit-format repeated-lines via edit_file
prompt: |
  `src/log.ts` has three identical `log.info("start");` lines. Change ONLY the
  one that sits between `doThing();` and `doOther();` to `log.info("middle");`,
  leaving the other two unchanged. Use edit_file (include enough surrounding
  context to target the right occurrence). Reply "done" when applied.
setup:
  files:
    src/log.ts: |
      log.info("start");
      doThing();
      log.info("start");
      doOther();
      log.info("start");
expect:
  - tool_called: edit_file
  - file_contains:
      path: src/log.ts
      pattern: log.info("middle");
  - status: done
budget:
  maxSteps: 7
  maxCostUsd: 0.25

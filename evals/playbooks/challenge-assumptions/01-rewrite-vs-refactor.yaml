name: 01-rewrite-vs-refactor
playbook: challenge-assumptions
prompt: |-
  The team decided to refactor (not rewrite) the billing module
  on the assumption that "the code is >70% reusable" and "the
  feature stays relevant for 18 months". Challenge that
  reasoning: name load-bearing premises, propose alternative
  framings, list falsifiers, and surface confidence gaps.
expect:
  output_schema_valid: true
  output_contains:
    - unverified_premises
    - alternative_framings
    - falsifiers

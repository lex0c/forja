name: 01-injection-and-secrets
playbook: security-audit
prompt: |-
  Audit the file `src/api/user.ts` for security issues. The file
  builds SQL queries with string interpolation and reads
  `process.env.SECRET_KEY` to sign tokens. Walk the threat model
  end to end.
expect:
  output_schema_valid: true
  output_contains:
    - threat_model
    - findings
    - not_checked

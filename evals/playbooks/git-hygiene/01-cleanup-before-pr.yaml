name: 01-cleanup-before-pr
playbook: git-hygiene
prompt: |-
  My branch `feat/auth-refactor` has 3 commits with messages
  "wip", "fix typo", and "cleanup". Before I open the PR, suggest
  a cleanup. Detect the project's commit-message convention from
  the recent log and propose squash + rewrite commands. Do NOT
  execute anything.
expect:
  output_schema_valid: true
  output_contains:
    - branch_assessment
    - suggestions

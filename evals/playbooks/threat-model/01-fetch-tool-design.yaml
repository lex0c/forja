name: 01-fetch-tool-design
playbook: threat-model
prompt: |-
  Threat-model the proposed `fetch_url` tool described in
  CONTRACTS.md §2.6.5b. Inputs: URL from the model, output: HTTP
  body returned to the harness. Cover STRIDE for the trust
  boundary between the model and the network. Note residual
  risks for every mitigation you propose.
expect:
  output_schema_valid: true
  output_contains:
    - trust_boundaries
    - threats
    - assumptions

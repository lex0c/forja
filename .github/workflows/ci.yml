name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: typecheck · lint · test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6  # v2
        with:
          bun-version: 1.3.13

      - name: Install ripgrep
        # The grep tool wraps `rg`. Tests gracefully skip if rg is missing,
        # but CI installs it explicitly so coverage doesn't silently shrink.
        run: sudo apt-get update && sudo apt-get install -y ripgrep

      - name: Install deps
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Lint
        run: bun run lint

      - name: Test
        run: bun test

  audit:
    # Dependency vulnerability gate (SECURITY_GUIDELINE.md §7.1: "Dep
    # audit em CI; CVE high+ bloqueia merge"). Own job so a CVE signal
    # is independent of the typecheck/lint/test job. `bun audit` exits
    # non-zero when any advisory at or above the level is found; we gate
    # at high. Moderates are reported by `bun audit` locally but do not
    # block. A new high in a transitive dep fails the PR — bump the
    # floor via package.json `overrides` (see ws / protobufjs).
    name: dependency audit
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6  # v2
        with:
          bun-version: 1.3.13

      - name: Install deps
        run: bun install --frozen-lockfile

      - name: Audit (high+ blocks)
        run: bun audit --audit-level=high

  build-matrix:
    # Smoke-builds every release target on every PR. Catches a
    # broken Bun --target before tag time. The size gate runs here
    # too: a +20% blow-up should fail the PR, not surprise us at
    # release. Reproducibility is intentionally NOT in this job —
    # it's slow (double build) and the release workflow gates on it
    # before publish.
    name: cross-platform build · size gate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6  # v2
        with:
          bun-version: 1.3.13

      - name: Install deps
        run: bun install --frozen-lockfile

      - name: Build all targets
        run: bun run build:release

      - name: Size gate
        run: bun run build:size

      - name: SHA256SUMS round-trip
        run: |
          bun run build:checksums
          bun run build:verify

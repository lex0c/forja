name: release

# Triggers on `vX.Y.Z` tags. Manual `workflow_dispatch` is wired so a
# release can be re-attempted without retagging — the tag form is the
# canonical path; manual is for breakage recovery. The manual path
# REQUIRES the tag to already exist; we check out at that ref so the
# binaries match the tag, not whichever branch dispatched the workflow.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to release (e.g. v0.1.0). Required for manual dispatch.'
        required: true

permissions:
  contents: write       # uploading release assets
  id-token: write       # OIDC token for Sigstore-backed build provenance
  attestations: write   # writing SLSA provenance to the GitHub attestation store

concurrency:
  # Key by the resolved tag, NOT by `github.ref_name`. On a manual
  # `workflow_dispatch`, `github.ref_name` is the branch the run was
  # dispatched FROM (typically `main`), not the tag in `inputs.tag`.
  # Two manual releases for the same tag dispatched from different
  # branches would otherwise hash to different groups and race in
  # `publish` (both invoking `gh release upload --clobber`). Putting
  # `inputs.tag` first means: tag push → empty inputs.tag → falls
  # through to `github.ref_name` (= the tag); manual dispatch →
  # uses the operator-supplied tag directly. Same key in both paths
  # for the same release.
  group: release-${{ github.event.inputs.tag || github.ref_name }}
  cancel-in-progress: false

# Single source of truth for the ref every job builds and publishes
# against. On a tag push it's `github.ref` (= refs/tags/vX.Y.Z); on a
# manual dispatch it's the operator-supplied tag name. Both forms
# resolve to a tag, never a branch HEAD — so a manual rerun while
# main has moved on still ships the exact commit at the tag.
env:
  RELEASE_REF: ${{ inputs.tag || github.ref }}

jobs:
  # Single-runner build of every target via Bun's cross-compile. We
  # consciously do NOT use a runner matrix because Bun's --target
  # produces the right binary from any host (PERFORMANCE.md §18.5
  # line 626 lists targets, not runners). One runner == one cache
  # warmup, one SBOM, one reproducibility check; an ARM/macOS runner
  # per target buys nothing FOR THE BUILD. Runtime execution is a
  # separate question — that's validated on native runners in the
  # exec-check job below.
  build:
    name: build · sbom · size gate · checksums
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          ref: ${{ env.RELEASE_REF }}
          fetch-depth: 0

      - name: Verify ref resolves to a tag
        # Defense in depth: a manual dispatch with `inputs.tag`
        # pointing at a branch name would be checked out by the step
        # above and pass; this verifies we're actually on a tag.
        shell: bash
        run: |
          set -euo pipefail
          ref="${{ env.RELEASE_REF }}"
          # `refs/tags/<name>` form (tag-push trigger) or bare tag
          # name (workflow_dispatch). Strip the prefix if present.
          tag="${ref#refs/tags/}"
          git rev-parse --verify "refs/tags/$tag" >/dev/null

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6  # v2
        with:
          bun-version: 1.3.13

      - name: Install deps
        run: bun install --frozen-lockfile

      # Stamp the tag into src/cli/version.ts BEFORE building, so binaries
      # are named forja-<version>-<id> and `forja --version` reports the
      # real version instead of the committed 0.0.0 placeholder
      # (PERFORMANCE.md §18.6). Deterministic (same tag → same bytes), so
      # it does not perturb the reproducibility job, which stamps
      # identically.
      - name: Stamp version from tag
        shell: bash
        run: |
          set -euo pipefail
          ref="${{ env.RELEASE_REF }}"
          bun run scripts/stamp-version.ts "${ref#refs/tags/}"

      - name: Build all targets
        run: bun run build:release

      - name: Size gate (PERFORMANCE.md §18.2)
        run: bun run build:size

      - name: SBOM (CycloneDX)
        run: bun run build:sbom

      - name: SHA256SUMS
        run: bun run build:checksums

      - name: Verify checksums (round-trip sanity)
        run: bun run build:verify

      - name: Attest build provenance (SLSA)
        # Signs a provenance attestation for every artifact listed in
        # SHA256SUMS (the binaries + the SBOM) via Sigstore-backed GitHub
        # attestations. Driven off the SUMS — not a dist/forja-* glob —
        # so it attests exactly what ships and never the unpublished
        # sourcemaps. Verify a downloaded binary with:
        #   gh attestation verify <binary> --repo <owner>/<repo>
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373  # v4.1.1
        with:
          subject-checksums: dist/SHA256SUMS

      - name: Upload artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: release-assets
          path: |
            dist/forja-*
            dist/sbom.cdx.json
            dist/SHA256SUMS
          # Keep retention modest; assets land in GitHub Releases
          # below as the durable copy. The artifact is a transport
          # between jobs.
          retention-days: 7
          if-no-files-found: error

  # Reproducible-build verification runs in its own job so a failure
  # surfaces independently in the workflow timeline. Slow (double
  # build) and not load-bearing for the upload step, so it parallels
  # the build job rather than gating it.
  reproducibility:
    name: reproducible build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          ref: ${{ env.RELEASE_REF }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6  # v2
        with:
          bun-version: 1.3.13

      - name: Install deps
        run: bun install --frozen-lockfile

      # Stamp identically to the build job so this verifies the SHIPPED
      # (stamped) binary is reproducible, not a 0.0.0 variant that never
      # ships (PERFORMANCE.md §18.6).
      - name: Stamp version from tag
        shell: bash
        run: |
          set -euo pipefail
          ref="${{ env.RELEASE_REF }}"
          bun run scripts/stamp-version.ts "${ref#refs/tags/}"

      - name: Reproducibility check
        run: bun run build:repro

  # Runtime smoke on each target's NATIVE OS/arch. The build job's
  # post-build smoke can only exec the one target matching its host
  # (ubuntu-x64); the other four are cross-compiled and never actually
  # run until a user installs them. This matrix downloads the
  # already-built binaries and EXECUTES each on a matching runner
  # (except darwin-x64 — see the matrix note below) —
  # catching a binary that links but won't boot on its target platform
  # (syscall/runtime/path regressions a cross-compile can't surface).
  # Build stays single-runner (Bun cross-compile); only EXECUTION fans
  # out, so the cost is seconds per runner, not a per-OS rebuild.
  # Gates publish: a binary that won't run must not ship.
  exec-check:
    name: exec smoke · ${{ matrix.target }}
    needs: build
    strategy:
      fail-fast: false
      matrix:
        include:
          - { target: linux-x64, os: ubuntu-latest }
          - { target: linux-arm64, os: ubuntu-24.04-arm }
          # darwin-x64 is deliberately NOT exec-checked: GitHub retired
          # the macos-13 (Intel) hosted runner and macos-latest is Apple
          # Silicon, so there is no native x64 macOS runner to boot it on
          # (a macos-13 request now queues forever, wedging publish). The
          # binary still builds, is size-gated, attested, and shipped — it
          # is simply not exec-verified on native hardware here. Declared
          # measurement gap: the darwin-arm64 leg below covers the macOS
          # runtime path, and x64 users get the same compiled artifact.
          # Re-add a leg (native, or under Rosetta on macos-14) if a
          # native x64 macOS runner returns.
          - { target: darwin-arm64, os: macos-14 }
          - { target: windows-x64, os: windows-latest }
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    steps:
      - name: Download built binaries
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: release-assets
          path: dist

      - name: Exec smoke (--version + broker echo)
        shell: bash
        run: |
          set -euo pipefail
          target='${{ matrix.target }}'
          # Locate this target's binary in the downloaded artifact.
          # Asset name is forja-<version>-<target>[.exe]; the version
          # segment is opaque here, so glob it. Sourcemaps (.map) and
          # other targets don't match the -<target> suffix.
          if [ "$target" = "windows-x64" ]; then
            bin=$(ls dist/forja-*-"$target".exe)
          else
            bin=$(ls dist/forja-*-"$target")
            chmod +x "$bin"
          fi
          echo "binary: $bin"

          # 1) Loads and runs on this OS/arch at all.
          ver=$("$bin" --version)
          echo "version: $ver"
          [ -n "$ver" ] || { echo "::error::--version produced no output on $target"; exit 1; }

          # 2) Broker-worker dispatch works in the compiled binary —
          #    same check as the post-build smoke, but on the NATIVE
          #    OS/arch this time.
          req='{"toolName":"__echo__","args":{"smoke":true},"capabilities":[],"sandboxProfile":null}'
          out=$(printf '%s' "$req" | FORJA_BROKER_WORKER=1 "$bin")
          echo "broker: $out"
          printf '%s' "$out" | grep -q '"ok":true' || { echo "::error::broker echo not ok on $target"; exit 1; }
          printf '%s' "$out" | grep -q '__echo__' || { echo "::error::broker echo payload mismatch on $target"; exit 1; }
          echo "exec smoke ok: $target"

  publish:
    name: publish GitHub Release
    needs: [build, reproducibility, exec-check]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          ref: ${{ env.RELEASE_REF }}

      - name: Download artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: release-assets
          path: dist

      - name: Resolve tag
        id: tag
        shell: bash
        run: |
          set -euo pipefail
          ref="${{ env.RELEASE_REF }}"
          tag="${ref#refs/tags/}"
          echo "name=$tag" >> "$GITHUB_OUTPUT"

      - name: Create / update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.tag.outputs.name }}
        shell: bash
        run: |
          set -euo pipefail
          # Publish binaries only — exclude sourcemaps. The dist/forja-*
          # glob also matches the .map files, which checksums.ts keeps
          # OUT of SHA256SUMS by design; publishing them would ship an
          # unverifiable release asset. The .map stay in the CI artifact
          # (7-day retention) for debugging instead. Word-splitting on
          # $bins is intentional (multiple file args); release filenames
          # are controlled and contain no spaces.
          bins=$(find dist -maxdepth 1 -type f -name 'forja-*' ! -name '*.map' | sort)
          [ -n "$bins" ] || { echo "no release binaries found in dist/" >&2; exit 1; }
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" --clobber $bins dist/sbom.cdx.json dist/SHA256SUMS
          else
            # No --target: this workflow only ever runs on a tag that
            # already exists (tag-push trigger, or a manual dispatch
            # gated by the "Verify ref resolves to a tag" step), so gh
            # creates the release straight from that existing tag.
            # Passing `--target "$TAG"` fed the TAG NAME as
            # target_commitish, which the API accepts only as a branch or
            # commit SHA — it 422'd with "Release.target_commitish is
            # invalid". Do not re-add it.
            gh release create "$TAG" \
              --title "$TAG" \
              --generate-notes \
              $bins dist/sbom.cdx.json dist/SHA256SUMS
          fi

  # Additional distribution channel: npm (PERFORMANCE.md §18.6). Ships the
  # SAME binaries as the GitHub Release — pulled from the shared
  # `release-assets` artifact and RE-VERIFIED against SHA256SUMS at pack
  # time (fail-closed) — as a launcher package (@lex0c/forja) plus five
  # os/cpu-gated per-platform packages (@lex0c/forja-<target_id>).
  #
  # Depends on `publish` (not just the build gates) so npm goes LAST: npm
  # versions are immutable (no --clobber) and the packages point users back
  # to the GitHub Release (README install + the launcher's missing-binary
  # error). Running in parallel with `publish` risks shipping irreversible
  # npm packages whose primary verified fallback failed or only partially
  # uploaded. `publish` does not depend on npm, so a broken npm side still
  # never wedges the GitHub Release.
  publish-npm:
    name: publish npm packages
    needs: [build, reproducibility, exec-check, publish]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write   # OIDC: npm Trusted Publishing + --provenance
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          ref: ${{ env.RELEASE_REF }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6  # v2
        with:
          bun-version: 1.3.13

      - name: Install deps
        run: bun install --frozen-lockfile

      - name: Download built binaries
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: release-assets
          path: dist

      - name: Resolve version
        id: ver
        shell: bash
        run: |
          set -euo pipefail
          ref="${{ env.RELEASE_REF }}"
          tag="${ref#refs/tags/}"
          echo "value=${tag#v}" >> "$GITHUB_OUTPUT"

      # No version stamp here: npm-pack locates binaries by target suffix
      # and takes the package version from --version below — it never reads
      # src/cli/version.ts or assetName. The build job's stamp handles the
      # binary's own --version. (Do not re-add a stamp step; it is a no-op.)

      # npm Trusted Publishing + provenance require npm >= 11.5.1; the
      # runner's bundled npm may be older.
      - name: Upgrade npm (Trusted Publishing + provenance)
        run: npm install -g npm@latest

      - name: Assemble npm packages
        run: bun run scripts/npm-pack.ts --version="${{ steps.ver.outputs.value }}"

      # Publishes platform packages FIRST, launcher LAST; skips any version
      # already on the registry (npm has no --clobber, so re-dispatching the
      # same tag is safe). Auth is OIDC Trusted Publishing — no stored token
      # — using the id-token above; --provenance attaches the build
      # attestation (same OIDC chain as the SLSA step).
      #
      # ONE-TIME BOOTSTRAP: Trusted Publishing is configured per package on
      # npmjs.com, which needs the package name to exist first. For the
      # first release, publish the 6 packages once with a granular
      # automation token, then enable Trusted Publishing on each and drop
      # the token. Token fallback instead of OIDC: add actions/setup-node
      # with registry-url + node-version, and set
      #   env:
      #     NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Publish to npm
        run: bun run scripts/npm-publish.ts --out=dist-npm

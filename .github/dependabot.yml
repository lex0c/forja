# Dependabot config (SECURITY_GUIDELINE.md §7.1). Two ecosystems:
#
#   - bun: covers the Bun project. GitHub ships a native `bun` ecosystem,
#     distinct from `npm` (which serves npm/pnpm/yarn). It MUST be `bun`,
#     not `npm`: the npm updater does not understand `bun.lock`, so npm-
#     routed version PRs would bump `package.json` while leaving the
#     lockfile stale — and every job that runs `bun install
#     --frozen-lockfile` (CI check, audit, build-matrix, release) would
#     then fail on the mismatch. The bun updater regenerates `bun.lock`
#     alongside `package.json`. Keeps `@anthropic-ai/sdk`, `@google/genai`,
#     `openai`, and the transitive closure current; the `bun audit` CI
#     gate blocks high+ CVEs at merge, Dependabot is the proactive half
#     that opens the bump PRs before a CVE lands.
#   - github-actions: keeps the workflow action pins (`actions/checkout`,
#     `oven-sh/setup-bun`, `actions/attest-build-provenance`, …) current.
#     The actions are pinned by commit SHA; Dependabot bumps the SHA and
#     the `# vN` comment together, so the strong pin carries no manual
#     update burden.
#
# Grouped, weekly, modest PR cap so the queue stays reviewable. Every
# new direct dep still needs a PR justification per §7.1 — Dependabot
# only proposes; a human reviews.
version: 2
updates:
  - package-ecosystem: "bun"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps"
    groups:
      # Batch low-risk patch/minor bumps into one PR; majors stay
      # individual so their migration plan (§7.1) gets its own review.
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "ci"

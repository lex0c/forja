# Dependabot config (SECURITY_GUIDELINE.md §7.1). Two ecosystems:
#
#   - npm: covers the Bun project. Dependabot reads `bun.lock` under the
#     `npm` ecosystem (Bun shares the npm registry + lockfile model), so
#     this keeps `@anthropic-ai/sdk`, `@google/genai`, `openai`, and the
#     transitive closure current. The `bun audit` CI gate blocks high+
#     CVEs at merge time; Dependabot is the proactive half that opens the
#     bump PRs before a CVE lands.
#   - github-actions: keeps the workflow action pins (`actions/checkout`,
#     `oven-sh/setup-bun`, `actions/attest-build-provenance`, …) current.
#     The cheap half of supply-chain hygiene for the release pipeline.
#
# Grouped, weekly, modest PR cap so the queue stays reviewable. Every
# new direct dep still needs a PR justification per §7.1 — Dependabot
# only proposes; a human reviews.
version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps"
    groups:
      # Batch low-risk patch/minor bumps into one PR; majors stay
      # individual so their migration plan (§7.1) gets its own review.
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "ci"
